<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form method="post">
		<label for="name">Name</label>
		<input type="text" id="name" placeholder="Name" required/>
		<label for="email">Email</label>
		<input type="email" id="email" placeholder="Email" required/>
		<label >Gender:</labelel>
		<input  type="radio" id="gender_m" value="male" name="Gender" required />Male
		<input  type="radio" id="gender_f" value="female" name="Gender" required />Female
		<label for="cars">Car Brands</label>
		   <select id="cars" placeholder="--Please choose an option--" >
				<option>BMW</option>
				<option>AUDI</option>
				<option>FERARI</option>
				<option>BUGATI</option>
			</select>
			
		<label for="age">Age</label>	
		<input type="number" id="age" placeholder="Age" required/>
		<label for="dob">DOB</label><br>	
		<input type="date" id="dob" required/>
	    <label for="tel">Phone Number</label>
		<input type="tel" id="tel" placeholder="xxx-xxx-xxxx" />
		<label for="password">Password</label>
		<input type="password" id="password" placeholder="Password" required/>
		<label for="name">I agree to the TOS</label>
		<input type="checkbox" id="tos"  required />
		<button type="submit">Submit</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</body>

</html>
