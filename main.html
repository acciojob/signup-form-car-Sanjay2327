<!DOCTYPE html>

<html>

<head>
	<link rel="stylesheet" href="styles.css">
</head>

<body>
	<!-- the entire body must be written by student -->
	<form method="post">
		<label for="name">Name</label><br>
		<input type="text" id="name" placeholder="Name" required/><br>
		<label for="email">Email</label><br>
		<input type="email" id="email" placeholder="Email" required/><br>
		<label >Gender:</labelel><br>
		<input  type="radio" id="gender_m" value="male" name="Gender" required />Male
		<input  type="radio" id="gender_f" value="female" name="Gender" required />Female <br>
		<label for="cars">Car Brands</label>
		   <select id="cars" placeholder="--Please choose an option--" >
				<option>BMW</option>
				<option>AUDI</option>
				<option>FERARI</option>
				<option>BUGATI</option>
			</select>
		<br>	
		<label for="age">Age</label><br>

		<label for="dob">DOB</label><br>	
		<input type="date" id="dob" required/> <br>
	    <label for="tel">Phone Number</label><br>
		<input type="tel" id="tel" placeholder="xxx-xxx-xxxx" />	<br>
		<label for="password">Password</label><br>
		<input type="password" id="password" placeholder="Password" required/><br>
		<label for="name">I agree to the TOS</label><br>
		<input type="checkbox" id="tos"  required /><br>
		<button type="submit">Submit</button>
	</form>
    <script type="text/javascript" src="./script.js">
</script>

</html>
